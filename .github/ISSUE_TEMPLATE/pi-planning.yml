name: PI Planning Generator
description: Generate a PI plan using a saved team profile
title: "[PI Planning] PI <version> — <Team Name>"
labels: ["pi-planning"]

body:
  - type: markdown
    attributes:
      value: |
        ## PI Planning Generator

        Select a saved team profile, then add what is new or different for this PI.

  - type: dropdown
    id: team_profile
    attributes:
      label: Team profile
      description: Choose the team profile to use.
      options:
        - supernova
    validations:
      required: true

  - type: input
    id: pi_version
    attributes:
      label: PI version
      placeholder: "27.2"
    validations:
      required: true

  - type: dropdown
    id: planning_type
    attributes:
      label: Planning type
      options:
        - New PI planning
        - Mid-PI replan
        - Capacity review
        - Dependency review
    validations:
      required: true

  - type: checkboxes
    id: business_priorities
    attributes:
      label: Business priorities
      options:
        - label: Customer commitments
        - label: Reliability / stability
        - label: Technical debt
        - label: Platform improvements
        - label: Security / compliance
        - label: AI / automation
        - label: Performance
        - label: Operational support

  - type: textarea
    id: major_features
    attributes:
      label: Major features or work items
      description: Add the important work for this PI. Keep it simple; the AI will break these into stories and estimates.
      placeholder: |
        - Improve customer onboarding flow
        - Add AI-powered insights dashboard
        - Harden API rate limiting
    validations:
      required: true

  - type: textarea
    id: capacity_overrides
    attributes:
      label: Capacity / PTO changes
      description: Only enter what is different from the saved team profile.
      placeholder: |
        - Priya out Sprint 2 for 2 days
        - Team all-hands during Sprint 3
        - Reserve extra 10% for production support
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Optional. Add known team, vendor, or platform dependencies.
      placeholder: |
        - Need Orion ML API contract by Sprint 1 Week 2
        - Messaging Team must confirm webhook support
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Optional. Add special context, constraints, or leadership asks.
      placeholder: |
        - Executive demo expected near end of PI
        - Customer commitment must be completed before Sprint 4
    validations:
      required: false